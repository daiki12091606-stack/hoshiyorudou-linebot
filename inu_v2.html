<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>犬種パーソナリティ診断 — あなたはどの犬？</title>
<meta name="description" content="20の質問でわかる犬種パーソナリティ。16犬種から診断 — 星夜堂の犬種診断。">
<style>
:root{
  --bg:#0d0d1a;--card:#141428;--card2:#1a1a32;--border:#2a2a4a;
  --pr:#7c6ff5;--pr2:#a89ff8;--text:#e8e6ff;--sub:#8888aa;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(124,111,245,.15) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(168,159,248,.08) 0%,transparent 55%);
}
#app{max-width:480px;margin:0 auto;padding:16px 16px 40px;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;animation:fadeUp .4s ease both}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* TOP SCREEN */
#top{align-items:center;justify-content:flex-start;text-align:center;gap:18px;padding:20px 0}
.top-icon{font-size:72px;filter:drop-shadow(0 0 24px rgba(124,111,245,.7));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.top-title{font-size:26px;font-weight:900;letter-spacing:.04em;
  background:linear-gradient(135deg,var(--pr2),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-sub{font-size:13px;color:var(--sub);line-height:1.7;max-width:320px}
.top-meta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--sub)}

/* BREED GRID */
.breed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin:4px 0}
.breed-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 4px 8px;
  text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.breed-card::before{content:'';position:absolute;inset:0;background:var(--bc,transparent);opacity:.08;border-radius:12px}
.breed-card:hover{transform:translateY(-2px);border-color:var(--bc,var(--pr));box-shadow:0 4px 16px rgba(0,0,0,.4)}
.dog-portrait{width:52px;height:52px;border-radius:50%;border:2.5px solid var(--bc,var(--pr));
  display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 5px;
  background:rgba(0,0,0,.3)}
.breed-card-name{font-size:9px;color:var(--sub);line-height:1.3}

/* START BTN */
.btn-start{width:100%;max-width:320px;padding:16px;
  background:linear-gradient(135deg,var(--pr),#9c8fff);
  color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,111,245,.4);transition:.2s;letter-spacing:.05em;margin-top:4px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,111,245,.5)}

/* QUESTION SCREEN */
.progress-wrap{padding:8px 0 16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:8px}
.progress-bar{height:5px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pr),var(--pr2));border-radius:3px;transition:width .4s ease}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.q-num{font-size:11px;color:var(--pr2);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.q-text{font-size:16px;font-weight:700;line-height:1.6}
.options{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;
  font-size:14px;line-height:1.5;cursor:pointer;transition:.2s;text-align:left;color:var(--text)}
.opt:hover{border-color:var(--pr2);background:rgba(124,111,245,.12);transform:translateX(4px)}
.btn-back{display:none;align-items:center;gap:6px;background:none;border:1px solid var(--border);
  border-radius:10px;padding:9px 14px;color:var(--sub);font-size:13px;cursor:pointer;margin-top:8px;
  transition:.2s;width:fit-content}
.btn-back:hover{border-color:var(--pr);color:var(--pr2)}

/* RESULT SCREEN */
.result-hero{border-radius:20px;padding:28px 20px 22px;text-align:center;margin-bottom:18px;
  border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;inset:0;background:var(--bc,var(--pr));opacity:.06}
.result-icon{font-size:70px;margin-bottom:10px;filter:drop-shadow(0 0 20px var(--bc,var(--pr)))}
.result-type{font-size:11px;letter-spacing:.15em;font-weight:700;color:var(--bc,var(--pr2));margin-bottom:6px}
.result-name{font-size:26px;font-weight:900;margin-bottom:8px}
.result-catch{font-size:14px;color:var(--sub);line-height:1.6;max-width:300px;margin:0 auto}
.section-title{font-size:13px;font-weight:700;color:var(--pr2);letter-spacing:.08em;margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--pr);border-radius:2px}
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.trait-chip{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px}
.trait-chip.weak{border-color:rgba(255,100,100,.2);background:rgba(255,80,80,.05);color:#ff9999}
.desc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}
.desc-text{font-size:14px;line-height:1.8;color:var(--text)}
.compat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.compat-icon{font-size:36px;flex-shrink:0}
.compat-name{font-size:12px;color:var(--sub);margin-bottom:2px}
.compat-breed{font-size:16px;font-weight:700;margin-bottom:4px}
.compat-why{font-size:13px;color:var(--sub);line-height:1.5}
.radar-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.stat-label{font-size:12px;color:var(--sub);width:52px;flex-shrink:0}
.stat-bar-bg{flex:1;height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pr),var(--pr2));transition:width .8s ease}
.stat-val{font-size:12px;color:var(--pr2);width:28px;text-align:right}
.btn-retry{width:100%;padding:15px;background:var(--card2);border:1.5px solid var(--pr);
  color:var(--pr2);border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
.btn-retry:hover{background:rgba(124,111,245,.15)}
.btn-share{width:100%;padding:15px;background:linear-gradient(135deg,var(--pr),#9c8fff);
  border:none;color:#fff;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:10px}
.btn-share:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,111,245,.4)}

/* MODAL */
#breed-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  align-items:flex-end;justify-content:center;padding:0}
#breed-modal.open{display:flex;animation:fadeUp .3s ease both}
.modal-inner{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:14px;right:16px;background:var(--card2);border:none;
  color:var(--sub);font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.modal-breed-icon{font-size:48px;text-align:center;margin-bottom:8px}
.modal-breed-name{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.modal-breed-catch{font-size:13px;color:var(--sub);text-align:center;margin-bottom:16px;line-height:1.5}
.modal-traits{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.modal-trait{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px}
.modal-desc{font-size:13px;line-height:1.7;color:var(--sub)}
</style>
</head>
<body>
<div id="app">

<!-- TOP -->
<div id="top" class="screen active">
  <div class="top-icon">🐕</div>
  <div class="top-title">犬種パーソナリティ診断</div>
  <div class="top-sub">20の質問であなたの犬種タイプがわかる。16犬種の中からあなたにぴったりの一匹を診断。</div>
  <div class="top-meta">
    <span class="badge">🐾 16犬種</span>
    <span class="badge">❓ 20問</span>
    <span class="badge">⏱ 約3分</span>
  </div>
  <div class="breed-grid" id="breed-grid-preview"></div>
  <button class="btn-start" onclick="startQuiz()">診断スタート 🐶</button>
</div>

<!-- QUESTION -->
<div id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="q-label">質問 1 / 20</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="q-card">
    <div class="q-num" id="q-num">Q1</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="options" id="options"></div>
  <button class="btn-back" id="btn-back" onclick="goBack()">← 前の質問に戻る</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-hero" id="result-hero">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-type">あなたの犬種タイプ</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-catch" id="result-catch"></div>
  </div>
  <div class="desc-card">
    <div class="section-title">タイプ解説</div>
    <div class="desc-text" id="result-desc"></div>
  </div>
  <div>
    <div class="section-title">強み</div>
    <div class="traits-grid" id="result-traits"></div>
  </div>
  <div style="margin-top:18px">
    <div class="section-title">苦手なこと</div>
    <div class="traits-grid" id="result-weaknesses"></div>
  </div>
  <div class="radar-wrap" style="margin-top:18px">
    <div class="section-title">特性チャート</div>
    <div id="result-stats"></div>
  </div>
  <div class="compat-card" id="result-compat">
    <div class="compat-icon" id="compat-icon"></div>
    <div>
      <div class="compat-name">相性のいい犬種</div>
      <div class="compat-breed" id="compat-breed"></div>
      <div class="compat-why" id="compat-why"></div>
    </div>
  </div>
  <button class="btn-share" onclick="shareResult()">📣 結果をシェアする</button>
  <button class="btn-retry" onclick="retryQuiz()">🔄 もう一度診断する</button>
</div>

</div>

<!-- BREED MODAL -->
<div id="breed-modal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeBreedModal()">✕</button>
    <div class="modal-breed-icon" id="modal-icon"></div>
    <div class="modal-breed-name" id="modal-name"></div>
    <div class="modal-breed-catch" id="modal-catch"></div>
    <div class="modal-traits" id="modal-traits"></div>
    <div class="modal-desc" id="modal-desc"></div>
  </div>
</div>

<script>
const results = {
  border:{color:'#4fc3f7',emoji:'🐕',name:'ボーダーコリー',
    catch:'知性と行動力を兼ね備えた完璧主義者。常に最善を追い求める。',
    traits:['🧠 超高知性','⚡ 素早い判断','🎯 集中力抜群','📐 完璧主義'],
    weaknesses:['😤 手持ち無沙汰に弱い','🔄 柔軟性に欠けることも','😓 自分に厳しすぎる'],
    desc:'ボーダーコリータイプのあなたは、抜群の知性と実行力を兼ね備えた戦略家。目標を定めたら一直線に突き進む集中力と、物事の本質を瞬時に見抜く洞察力が持ち味。完璧を目指す向上心が高く、チームの知的リーダーとして活躍します。',
    compat:{emoji:'🐕‍🦺',name:'ゴールデンレトリバー',why:'あなたの完璧主義を温かく受け止め、緊張を解きほぐしてくれる最高のパートナー。'},
    tend:{知性:98,行動力:80,社交性:45,共感力:60,自由度:55}},

  akita:{color:'#ff7043',emoji:'🐺',name:'秋田犬',
    catch:'誇り高き孤高の魂。一度決めたら揺るがない強い意志の持ち主。',
    traits:['👑 高い誇り','🛡 強い意志','🤫 寡黙で深い','💪 芯の強さ'],
    weaknesses:['🤝 協調が苦手なことも','😶 表現が不器用','🆕 変化への適応が遅い'],
    desc:'秋田犬タイプのあなたは、揺るぎない信念と孤高の精神を持つ存在感抜群の人物。言葉より行動で示すタイプで、一度信頼した相手には深い忠誠心を示します。多くを語らずとも、その存在感だけで周囲を引き締める力を持っています。',
    compat:{emoji:'🦮',name:'ラフコリー',why:'あなたの寡黙さを理解し、穏やかに橋渡しをしてくれる信頼できる存在。'},
    tend:{知性:72,行動力:65,社交性:30,共感力:55,自由度:75}},

  doberman:{color:'#5c6bc0',emoji:'🐕',name:'ドーベルマン',
    catch:'知性と威厳を併せ持つ戦略的リーダー。目標達成への執念は誰にも負けない。',
    traits:['🎖 自然なリーダーシップ','🧩 戦略的思考','⚡ 素早い決断','🔒 強い責任感'],
    weaknesses:['😌 リラックスが苦手','🙈 弱みを見せない','👂 他の意見を聞きにくい'],
    desc:'ドーベルマンタイプのあなたは、生まれながらのリーダー素質を持つ戦略家。冷静な判断力と圧倒的な実行力で目標を達成します。責任感が強く、任された役割には全力を尽くす。その威風堂々たる姿が周囲の信頼を勝ち取ります。',
    compat:{emoji:'🐩',name:'ポメラニアン',why:'あなたの緊張をほぐし、遊び心を引き出してくれる最高の相棒。'},
    tend:{知性:88,行動力:88,社交性:50,共感力:50,自由度:45}},

  jrt:{color:'#26c6da',emoji:'🐶',name:'ジャックラッセルテリア',
    catch:'エネルギーの塊！好奇心旺盛で何事も全力で楽しむ自由人。',
    traits:['🎉 無限のエネルギー','🔍 旺盛な好奇心','😂 ユーモアの達人','🚀 行動力満点'],
    weaknesses:['🛑 じっとしていられない','😅 衝動的な判断','📋 細かい作業が苦手'],
    desc:'ジャックラッセルテリアタイプのあなたは、溢れるエネルギーと好奇心で人生をとことん楽しむ自由人。新しいことへの挑戦を恐れず、どんな状況でもユーモアを忘れない明るさが周囲を元気にします。飽きることを知らない探求心が最大の武器です。',
    compat:{emoji:'🐕',name:'ボーダーコリー',why:'あなたのアイデアを形にする知性と計画性を持つ頼れるパートナー。'},
    tend:{知性:70,行動力:95,社交性:80,共感力:60,自由度:92}},

  rough_collie:{color:'#ffca28',emoji:'🦮',name:'ラフコリー',
    catch:'知性と優しさを持つ天然のカウンセラー。誰もが居心地よくなる空間を作る。',
    traits:['💛 深い共感力','🌟 思いやり','🗣 コミュニケーション上手','🛡 守護者気質'],
    weaknesses:['😰 心配性すぎる','🙅 断るのが苦手','😔 自己犠牲になりがち'],
    desc:'ラフコリータイプのあなたは、豊かな共感力と温かい包容力で周囲を支える存在。誰かが悩んでいれば自然と気づき、絶妙な言葉で寄り添います。チームの調和を保つ調停者として欠かせない存在で、その優しさが多くの人の心のよりどころになっています。',
    compat:{emoji:'🐕',name:'ボーダーコリー',why:'あなたの感情的サポートと相手の論理的思考が完璧にかみ合うコンビ。'},
    tend:{知性:78,行動力:60,社交性:88,共感力:96,自由度:50}},

  cavalier:{color:'#ec407a',emoji:'🐶',name:'キャバリア',
    catch:'愛情深く穏やか。誰とでも仲良くなれる究極の癒し系。',
    traits:['❤️ 無限の愛情','😊 穏やかさ','🤝 誰とでも仲良し','✨ 癒しのオーラ'],

    desc:'キャバリアタイプのあなたは、その場にいるだけで空気を和らげる天然の癒し系。誰に対しても分け隔てなく愛情を注ぎ、相手の良いところを自然と引き出します。人間関係を大切にし、繋がりの中に喜びを見出す、周囲になくてはならない存在です。',
    compat:{emoji:'🐕',name:'ドーベルマン',why:'あなたの柔らかさが相手の鋭さを包み、互いの弱点を補い合える関係。'},
    tend:{知性:60,行動力:55,社交性:95,共感力:92,自由度:60}},

  golden:{color:'#ffa726',emoji:'🐕‍🦺',name:'ゴールデンレトリバー',
    catch:'誰からも愛される太陽のような存在。ポジティブエネルギーで周囲を照らす。',
    traits:['☀️ 圧倒的ポジティブ','🫂 高い親しみやすさ','🌈 明るい雰囲気メーカー','🤲 奉仕精神'],
    weaknesses:['⚠️ 危険察知が遅れる','😤 怒れないことも','🎯 集中力の維持が難しい'],
    desc:'ゴールデンレトリバータイプのあなたは、そこにいるだけで空間を明るくする太陽のような存在。困った人を放っておけない奉仕精神と、どんな状況でも前向きに捉えるポジティブさが持ち味。幅広い人間関係を築き、コミュニティの中心的存在になります。',
    compat:{emoji:'🐕',name:'ボーダーコリー',why:'あなたの感情知性と相手の論理知性が組み合わさると最強のチームに。'},
    tend:{知性:68,行動力:72,社交性:98,共感力:90,自由度:65}},

  setter:{color:'#ff5722',emoji:'🐕',name:'アイリッシュセター',
    catch:'情熱と自由を愛するロマンティスト。直感で動き、熱狂的に夢を追う。',
    traits:['🔥 燃える情熱','🌊 自由な魂','💫 直感的判断','🎨 豊かな感受性'],
    weaknesses:['📌 継続が難しい','🤔 計画性が不足','😤 感情的になりすぎることも'],
    desc:'アイリッシュセタータイプのあなたは、豊かな感受性と燃えるような情熱で生きるアーティスト気質。直感を信じて動き、新しい体験や出会いに胸を躍らせます。その情熱は周囲を巻き込む力があり、夢に向かって突き進む姿が多くの人を鼓舞します。',
    compat:{emoji:'🐕',name:'ベルネーゼ',why:'あなたの情熱を地に足のついた方法で形にする力を持つ理想の相棒。'},
    tend:{知性:65,行動力:85,社交性:78,共感力:75,自由度:95}},

let scores={},currentQ=0,answerHistory=[],_shareText='';

function resetScores(){
  scores={};answerHistory=[];
  breedOrder.forEach(k=>scores[k]=0);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(){
  resetScores();currentQ=0;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion(){
  const q=questions[currentQ];
  document.getElementById('q-label').textContent=`質問 ${currentQ+1} / ${questions.length}`;
  document.getElementById('q-pct').textContent=Math.round(currentQ/questions.length*100)+'%';
  document.getElementById('progress-fill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('q-num').textContent=`Q${currentQ+1}`;
  document.getElementById('q-text').textContent=q.text;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=o.text;
    btn.onclick=()=>selectAnswer(o.scores,btn);
    opts.appendChild(btn);
  });
  const back=document.getElementById('btn-back');
  if(back)back.style.display=currentQ>0?'flex':'none';
}

function selectAnswer(scoreMap,btn){
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;b.style.opacity='.6';});
  btn.style.borderColor='var(--pr2)';btn.style.background='rgba(124,111,245,.2)';
  answerHistory.push(Object.assign({},scoreMap));
  Object.entries(scoreMap).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  currentQ++;
  if(currentQ>=questions.length){setTimeout(showResult,400);}
  else{setTimeout(renderQuestion,400);}
}

function goBack(){
  if(currentQ<=0)return;
  const last=answerHistory.pop();
  Object.entries(last).forEach(([k,v])=>{scores[k]=(scores[k]||0)-v;});
  currentQ--;
  renderQuestion();
}

function showResult(){
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const r=results[top];
  const hero=document.getElementById('result-hero');
  hero.style.setProperty('--bc',r.color);
  document.getElementById('result-icon').textContent=r.emoji;
  document.getElementById('result-name').textContent=r.name;
  document.getElementById('result-catch').textContent=r.catch;
  document.getElementById('result-desc').textContent=r.desc;
  const traitsEl=document.getElementById('result-traits');
  traitsEl.innerHTML=r.traits.map(t=>`<div class="trait-chip">${t}</div>`).join('');
  const weakEl=document.getElementById('result-weaknesses');
  weakEl.innerHTML=r.weaknesses.map(t=>`<div class="trait-chip weak">${t}</div>`).join('');
  const statsEl=document.getElementById('result-stats');
  statsEl.innerHTML=Object.entries(r.tend).map(([label,val])=>`
    <div class="stat-row">
      <div class="stat-label">${label}</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:0%" data-val="${val}"></div></div>
      <div class="stat-val">${val}</div>
    </div>`).join('');
  document.getElementById('compat-icon').textContent=r.compat.emoji;
  document.getElementById('compat-breed').textContent=r.compat.name;
  document.getElementById('compat-why').textContent=r.compat.why;
  _shareText=`私の犬種タイプは「${r.name}」でした！${r.catch}\n#犬種診断 #星夜堂`;
  showScreen('result');
  setTimeout(()=>{
    document.querySelectorAll('.stat-bar-fill').forEach(el=>{
      el.style.width=el.dataset.val+'%';
    });
  },100);
}

function retryQuiz(){showScreen('top');}

function shareResult(){
  if(navigator.share){navigator.share({text:_shareText});}
  else{navigator.clipboard.writeText(_shareText).then(()=>alert('クリップボードにコピーしました！'));}
}

function showBreedSummary(key){
  const r=results[key];
  if(!r)return;
  document.getElementById('modal-icon').textContent=r.emoji;
  document.getElementById('modal-name').textContent=r.name;
  document.getElementById('modal-catch').textContent=r.catch;
  document.getElementById('modal-traits').innerHTML=r.traits.map(t=>`<span class="modal-trait">${t}</span>`).join('');
  document.getElementById('modal-desc').textContent=r.desc;
  const modal=document.getElementById('breed-modal');
  modal.style.display='flex';
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeBreedModal(){
  const modal=document.getElementById('breed-modal');
  modal.style.display='none';
  modal.classList.remove('open');
  document.body.style.overflow='';
}

// Build breed grid
(function(){
  const grid=document.getElementById('breed-grid-preview');
  breedOrder.forEach(key=>{
    const r=results[key];
    const card=document.createElement('div');
    card.className='breed-card';
    card.style.setProperty('--bc',r.color);
    card.innerHTML=`<div class="dog-portrait">${r.emoji}</div><div class="breed-card-name">${r.name}</div>`;
    card.onclick=()=>showBreedSummary(key);
    grid.appendChild(card);
  });
})();

// Close modal on backdrop click
document.getElementById('breed-modal').addEventListener('click',function(e){
  if(e.target===this)closeBreedModal();
});
</script>
</body>
</html>
