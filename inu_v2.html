<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>犬種パーソナリティ診断 — あなたはどの犬？</title>
<meta name="description" content="10の質問でわかる犬種パーソナリティ。柴犬・ゴールデン・トイプードル・ボーダーコリー・ダックス・チワワ・ラブラドール・ハスキー — 星夜堂の犬種診断。">
<style>
:root{
  --pr:#6b3a1f;--pr2:#c47d45;--cream:#f5deb3;--cream2:#fff8f0;
  --bg:#130d08;--card:#221508;--card2:#2c1c0c;--border:#4a2e15;
  --text:#fdf3e7;--sub:#b8956a;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 25% 25%,rgba(107,58,31,.2) 0%,transparent 60%),
    radial-gradient(ellipse at 75% 75%,rgba(196,125,69,.1) 0%,transparent 60%);
}
#app{max-width:480px;margin:0 auto;padding:16px 16px 40px;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;animation:fadeUp .4s ease both}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
#top{align-items:center;justify-content:center;text-align:center;gap:20px;padding:24px 0}
.top-icon{font-size:80px;filter:drop-shadow(0 0 20px rgba(196,125,69,.6));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.top-title{font-size:28px;font-weight:800;letter-spacing:.04em;
  background:linear-gradient(135deg,#f5cfa0,#fdf3e7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-sub{font-size:14px;color:var(--sub);line-height:1.7;max-width:320px}
.top-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--sub)}
.btn-start{width:100%;max-width:320px;padding:18px;background:linear-gradient(135deg,#6b3a1f,#c47d45);
  color:#fff;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(107,58,31,.4);transition:.2s;letter-spacing:.05em}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(107,58,31,.5)}
.types-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.type-chip{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;font-size:11px}
.type-chip .emoji{font-size:20px;display:block;margin-bottom:4px}
.progress-wrap{padding:8px 0 20px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:8px}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6b3a1f,#c47d45);border-radius:3px;transition:width .4s ease}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
.q-num{font-size:12px;color:var(--pr2);font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.q-text{font-size:17px;font-weight:700;line-height:1.6}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;
  font-size:15px;line-height:1.5;cursor:pointer;transition:.2s;text-align:left;color:var(--text)}
.opt:hover{border-color:var(--pr2);background:rgba(107,58,31,.25);transform:translateX(4px)}
.opt.selected{border-color:#f5cfa0;background:rgba(245,207,160,.12);color:#f5cfa0}
#result{gap:0;padding-top:0}
.result-hero{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border);
  border-radius:var(--radius);padding:32px 20px 24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);
  animation:heroIn .6s ease both}
@keyframes heroIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.result-icon{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 0 24px rgba(196,125,69,.7))}
.result-label{font-size:12px;color:var(--pr2);font-weight:700;letter-spacing:.15em;margin-bottom:8px}
.result-name{font-size:32px;font-weight:900;letter-spacing:.06em;margin-bottom:10px;
  background:linear-gradient(135deg,#f5cfa0,#fdf3e7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-catch{font-size:15px;color:var(--sub);line-height:1.6}
.result-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--pr2);letter-spacing:.08em;margin-bottom:14px}
.traits{display:flex;flex-wrap:wrap;gap:8px}
.trait{background:linear-gradient(135deg,rgba(107,58,31,.3),rgba(196,125,69,.2));
  border:1px solid rgba(196,125,69,.4);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.weaknesses{display:flex;flex-direction:column;gap:6px}
.weakness{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub)}
.weakness::before{content:'△';font-size:11px;color:var(--pr2)}
.desc{font-size:14px;line-height:1.8}
.compat{display:flex;align-items:center;gap:12px;background:var(--card2);border-radius:10px;padding:14px}
.compat-icon{font-size:32px}
.compat-name{font-size:16px;font-weight:700;color:#f5cfa0}
.compat-why{font-size:12px;color:var(--sub);margin-top:2px}
.tendency-bars{display:flex;flex-direction:column;gap:10px}
.tend-row{display:flex;align-items:center;gap:10px;font-size:13px}
.tend-label{width:80px;flex-shrink:0;color:var(--sub)}
.tend-bar-wrap{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.tend-bar{height:100%;background:linear-gradient(90deg,#6b3a1f,#c47d45);border-radius:4px;transition:width 1s ease .3s}
.tend-val{width:28px;text-align:right;font-size:12px;color:var(--pr2)}
.share-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.share-title{font-size:13px;font-weight:700;color:var(--sub);text-align:center;margin-bottom:14px}
.share-btns{display:flex;flex-direction:column;gap:10px}
.btn-x{background:#000;color:#fff;border:1.5px solid #333;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-x:hover{background:#1a1a1a;transform:translateY(-1px)}
.btn-line{background:#06c755;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-line:hover{background:#05b34c;transform:translateY(-1px)}
.btn-retry{background:transparent;color:var(--sub);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;width:100%;transition:.2s}
.btn-retry:hover{border-color:var(--pr2);color:var(--pr2)}
.line-cta{background:linear-gradient(135deg,#0a2a1a,#0d3b24);border:1px solid #1a5c35;border-radius:var(--radius);padding:24px 20px;text-align:center;margin-bottom:12px}
.line-cta-icon{font-size:36px;margin-bottom:8px}
.line-cta-title{font-size:17px;font-weight:800;color:#06c755;margin-bottom:8px}
.line-cta-text{font-size:13px;color:#7fbf93;line-height:1.6;margin-bottom:16px}
.btn-line-cta{background:#06c755;color:#fff;border:none;border-radius:12px;padding:16px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;text-decoration:none}
.btn-line-cta:hover{background:#05b34c;transform:translateY(-2px)}
.result-footer{text-align:center;font-size:11px;color:var(--sub);padding-top:8px}

.type-chip{cursor:pointer}
.type-chip:hover{border-color:var(--pr2);background:rgba(196,125,69,.18);transform:translateY(-2px);transition:.2s}
.btn-back{display:none;align-items:center;justify-content:center;gap:6px;margin-top:16px;
  background:transparent;color:var(--sub);border:1.5px solid var(--border);border-radius:12px;
  padding:10px 16px;font-size:14px;cursor:pointer;width:100%;transition:.2s}
.btn-back:hover{border-color:var(--pr2);color:var(--pr2)}
#breed-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;
  overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.breed-modal-inner{max-width:440px;margin:20px auto;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:32px 24px;animation:fadeUp .35s ease both}
.bm-close{float:right;background:transparent;border:none;font-size:24px;cursor:pointer;color:var(--sub);line-height:1;padding:0}
.bm-emoji{font-size:64px;display:block;text-align:center;margin-bottom:12px;filter:drop-shadow(0 0 16px rgba(196,125,69,.5))}
.bm-name{font-size:24px;font-weight:900;text-align:center;letter-spacing:.06em;margin-bottom:6px;
  background:linear-gradient(135deg,#f5cfa0,#fdf3e7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bm-catch{font-size:13px;color:var(--sub);text-align:center;margin-bottom:16px;line-height:1.5}
.bm-keywords{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.bm-kw{background:linear-gradient(135deg,rgba(107,58,31,.35),rgba(196,125,69,.25));
  border:1px solid rgba(196,125,69,.4);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600}
.bm-desc{font-size:14px;color:var(--sub);line-height:1.8;text-align:center;margin-bottom:22px}
.bm-startbtn{width:100%;padding:14px;background:linear-gradient(135deg,#6b3a1f,#c47d45);
  color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.bm-startbtn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div id="app">
<div id="top" class="screen active">
  <div class="top-icon">🐶</div>
  <div>
    <div class="top-title">犬種パーソナリティ診断</div>
    <div style="font-size:13px;color:#c47d45;margin-top:4px;margin-bottom:12px;font-weight:600;letter-spacing:.05em">あなたはどの犬タイプ？</div>
    <div class="top-sub">10の質問で、あなたの性格に最も近い犬種がわかります。8種類の個性豊かな犬から、あなたのタイプを診断します。</div>
  </div>
  <div class="top-meta">
    <span class="badge">⏱ 約2分</span>
    <span class="badge">❓ 全10問</span>
    <span class="badge">🐶 全8タイプ</span>
  </div>
  <div class="types-preview">
    <div class="type-chip" onclick="showBreedSummary('shiba')"><span class="emoji">🦊</span>柴犬</div>
    <div class="type-chip" onclick="showBreedSummary('golden')"><span class="emoji">🌟</span>ゴールデン</div>
    <div class="type-chip" onclick="showBreedSummary('poodle')"><span class="emoji">🐩</span>トイプードル</div>
    <div class="type-chip" onclick="showBreedSummary('border')"><span class="emoji">⚡</span>ボーダーコリー</div>
    <div class="type-chip" onclick="showBreedSummary('dachshund')"><span class="emoji">🌭</span>ダックスフント</div>
    <div class="type-chip" onclick="showBreedSummary('chihuahua')"><span class="emoji">🔥</span>チワワ</div>
    <div class="type-chip" onclick="showBreedSummary('labrador')"><span class="emoji">💛</span>ラブラドール</div>
    <div class="type-chip" onclick="showBreedSummary('husky')"><span class="emoji">🐺</span>ハスキー</div>
  </div>
  <button class="btn-start" onclick="startQuiz()">診断スタート 🐾</button>
</div>

<div id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-label"><span id="q-counter">Q 1 / 10</span><span id="q-pct">10%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
  </div>
  <div class="q-card">
    <div class="q-num" id="q-num-label">QUESTION 01</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="options" id="options-wrap"></div>
  <button class="btn-back" id="btn-back" onclick="goBack()">← 前の質問に戻る</button>
</div>

<div id="result" class="screen"></div>

<div id="breed-modal" onclick="if(event.target===this)closeBreedModal()">
  <div class="breed-modal-inner" id="breed-modal-content"></div>
</div>
</div>
<script>

const LINE_OA='https://lin.ee/hoshiyorudou';

const questions=[
  {text:'自分のこだわり、周囲とのズレを感じたとき？',opts:[

  ]},
  {text:'グループでの自分の役割は？',opts:[

    {text:'❤️ 熱量と誠実さで粘り強く取り組む',scores:{dachshund:3,golden:2}},
    {text:'⚡ エネルギッシュに勢いで突き進む',scores:{husky:3,chihuahua:2}},
  ]},
  {text:'友人があなたをどう見ている？',opts:[

    {text:'🏮 頑固・芯がある・ぶれない',scores:{shiba:3,chihuahua:2}},

    {text:'🌈 多くの人に愛され、愛し続ける人生',scores:{golden:3,labrador:2}},
    {text:'🌊 自由に、縛られずに生きる人生',scores:{husky:3,chihuahua:1}},

const results={
  shiba:{emoji:'🦊',name:'柴犬',catch:'信念の職人。自分の軸を絶対に曲げない',
    traits:['揺るぎない自分軸と信念','深い誠実さと責任感','独自のこだわりと美学'],

    traits:['圧倒的な集中力と実行力','高い目標を達成しようとする向上心','精緻な計画を立てる論理力'],

    compat:{emoji:'🐩',name:'トイプードルタイプ',why:'実行力と知性が最高の成果を生み出す'},
    tend:{社交力:55,忠誠心:75,知性:90,包容力:55,自由度:60}},
  dachshund:{emoji:'🌭',name:'ダックスフント',catch:'一度決めたら最後まで諦めない粘り腰',

let scores={},currentQ=0,_shareText='',answerHistory=[];
function resetScores(){scores={};answerHistory=[];Object.keys(results).forEach(k=>scores[k]=0);}
function startQuiz(){resetScores();currentQ=0;showScreen('quiz');renderQuestion();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function renderQuestion(){
  const q=questions[currentQ];const n=currentQ+1;const pct=Math.round(n/questions.length*100);
  document.getElementById('q-counter').textContent=`Q ${n} / ${questions.length}`;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-num-label').textContent='QUESTION '+String(n).padStart(2,'0');
  document.getElementById('q-text').textContent=q.text;
  const wrap=document.getElementById('options-wrap');wrap.innerHTML='';
  q.opts.forEach(opt=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=opt.text;btn.onclick=()=>selectAnswer(opt.scores,btn);wrap.appendChild(btn);});
  const bk=document.getElementById('btn-back');if(bk)bk.style.display=currentQ>0?'flex':'none';
}
function selectAnswer(scoreMap,btn){
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  btn.classList.add('selected');
  answerHistory.push(Object.assign({},scoreMap));
  Object.entries(scoreMap).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  setTimeout(()=>{currentQ++;if(currentQ<questions.length){renderQuestion();const c=document.querySelector('.q-card');c.style.animation='none';c.offsetHeight;c.style.animation='fadeUp .35s ease both';}else showResult();},420);
}
function goBack(){
  if(currentQ<=0)return;
  const last=answerHistory.pop();
  Object.entries(last).forEach(([k,v])=>{scores[k]=(scores[k]||0)-v;});
  currentQ--;
  renderQuestion();
  const c=document.querySelector('.q-card');c.style.animation='none';c.offsetHeight;c.style.animation='fadeUp .35s ease both';
}
function showResult(){
  const key=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const r=results[key];const el=document.getElementById('result');
  _shareText='私は「'+r.name+'」タイプでした！\nあなたはどの犬？\n';
  const tendHTML=Object.entries(r.tend).map(([label,val])=>
    `<div class="tend-row"><div class="tend-label">${label}</div><div class="tend-bar-wrap"><div class="tend-bar" style="width:0" data-w="${val}%"></div></div><div class="tend-val">${val}</div></div>`
  ).join('');
  el.innerHTML=`
    <div class="result-hero"><div class="result-icon">${r.emoji}</div><div class="result-label">あなたの犬タイプ</div><div class="result-name">${r.name}</div><div class="result-catch">${r.catch}</div></div>
    <div class="result-section"><div class="section-title">✨ 長所・強み</div><div class="traits">${r.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div></div>
    <div class="result-section"><div class="section-title">💬 詳細解説</div><div class="desc">${r.desc}</div></div>
    <div class="result-section"><div class="section-title">△ 気をつけたいこと</div><div class="weaknesses">${r.weaknesses.map(w=>`<div class="weakness">${w}</div>`).join('')}</div></div>
    <div class="result-section"><div class="section-title">💕 相性の良いタイプ</div><div class="compat"><div class="compat-icon">${r.compat.emoji}</div><div><div class="compat-name">${r.compat.name}</div><div class="compat-why">${r.compat.why}</div></div></div></div>
    <div class="result-section"><div class="section-title">📊 あなたの傾向</div><div class="tendency-bars">${tendHTML}</div></div>
    <div class="share-section"><div class="share-title">📣 結果をシェアしよう</div><div class="share-btns">
      <button class="btn-x" onclick="shareX()"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.742-8.852L1.512 2.25h6.961l4.263 5.623 5.508-5.623zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Xでシェア</button>
      <button class="btn-line" onclick="shareLINE()"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>LINEでシェア</button>
      <button class="btn-retry" onclick="startQuiz()">🔄 もう一度診断する</button>
    </div></div>
    <div class="line-cta"><div class="line-cta-icon">🔮</div><div class="line-cta-title">本格占いは星夜堂へ</div><div class="line-cta-text">犬タイプだけでなく、あなたの生年月日から<br>今日の運勢・今月の流れを毎日お届けします</div><a class="btn-line-cta" href="${LINE_OA}" target="_blank"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>星夜堂でもっと詳しく占う</a></div>
    <div class="result-footer">© 星夜堂 — 犬種パーソナリティ診断</div>
  `;
  showScreen('result');
  setTimeout(()=>{document.querySelectorAll('.tend-bar').forEach(b=>b.style.width=b.dataset.w);},400);
}
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(_shareText+SHARE_URL),'_blank');}
function shareLINE(){window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(SHARE_URL)+'&text='+encodeURIComponent(_shareText),'_blank');}
