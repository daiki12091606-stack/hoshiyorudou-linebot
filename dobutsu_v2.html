<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>動物パーソナリティ診断 🦁</title>
<style>
:root{--pr:#4caf74;--pr2:#80d4a0;--bg:#f0faf3;--card:#ffffff;--card2:#e8f7ec;--border:#90c8a0;--text:#0a200e;--sub:#3a6a4a;--fg:#0a200e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
/* NAV */
.app-nav{display:flex;justify-content:center;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid #90c8a088;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.nav-btn{padding:14px 18px;cursor:pointer;font-size:.82rem;color:var(--sub);background:transparent;border:none;border-bottom:2px solid transparent;transition:.2s;color:var(--sub)}
.nav-btn.active{color:var(--pr);border-bottom-color:var(--pr)}
/* SCREENS */
.screen{display:none;animation:fadeUp .38s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
main{max-width:480px;margin:0 auto;padding:16px 16px 48px}
/* HOME */
.hero{text-align:center;padding:28px 16px 16px}
.hero h1{font-size:1.65rem;font-weight:800;background:linear-gradient(135deg,#80d4a0,#c8f5d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero p{color:var(--sub);font-size:.92rem;margin-bottom:16px;line-height:1.6}
.hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.badge{background:var(--card2);border:1px solid #90c8a088;border-radius:20px;padding:5px 12px;font-size:.75rem;color:var(--sub)}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.tc{background:var(--card);border-radius:12px;padding:10px 6px 8px;text-align:center;transition:.2s;border:1px solid #90c8a066;cursor:pointer}
.tc:hover{transform:translateY(-2px);border-color:#4caf7488;background:var(--card2)}
.tc:active{transform:scale(.96)}
.tc-emoji{margin:0 auto 8px;display:block}
.tc-name{font-size:.58rem;color:var(--sub);margin-bottom:4px;line-height:1.3}
.tc-tag{font-size:.5rem;border-radius:10px;padding:2px 5px;display:inline-block}
.sec-label{font-size:.78rem;color:var(--pr);font-weight:600;text-align:center;margin:20px 0 12px;letter-spacing:.05em}
.btn{display:block;width:100%;background:linear-gradient(135deg,#1a5c30,#4caf74);color:#fff;border:none;border-radius:24px;padding:14px 28px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:.2s;text-align:center;margin-top:8px}
.btn:hover{opacity:.88;transform:translateY(-1px)}
/* QUIZ */
.prog-wrap{padding:8px 0 18px}
.prog-label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--sub);margin-bottom:8px}
.prog-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#4caf74,#80d4a0);border-radius:3px;transition:width .4s ease}
.q-card{background:var(--card);border:1px solid #90c8a055;border-radius:16px;padding:22px 18px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.q-num{font-size:.75rem;color:var(--pr2);font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.q-text{font-size:1.05rem;font-weight:700;line-height:1.65}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid #90c8a088;border-radius:12px;padding:14px 16px;font-size:.9rem;line-height:1.5;cursor:pointer;transition:.2s;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px}
.opt-icon{font-size:1.15rem;flex-shrink:0}
.opt:hover{border-color:var(--pr2);background:#4caf7418;transform:translateX(3px)}
.opt.selected{border-color:var(--pr2);background:#4caf7420;color:#80d4a0}
.btn-back{display:none;align-items:center;justify-content:center;gap:6px;margin-top:14px;background:transparent;color:var(--sub);border:1.5px solid #90c8a088;border-radius:12px;padding:10px 16px;font-size:.85rem;cursor:pointer;width:100%;transition:.2s}
.btn-back:hover{border-color:var(--pr);color:var(--pr)}
/* RESULT */
.result-hero{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid #90c8a066;border-radius:16px;padding:28px 18px 22px;text-align:center;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.result-icon{font-size:70px;margin-bottom:10px;filter:drop-shadow(0 0 20px #4caf74aa)}
.result-label{font-size:.75rem;color:var(--pr);font-weight:700;letter-spacing:.15em;margin-bottom:6px}
.result-name{font-size:2rem;font-weight:900;letter-spacing:.06em;margin-bottom:8px;background:linear-gradient(135deg,#80d4a0,#c8f5d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-catch{font-size:.9rem;color:var(--sub);line-height:1.6}
.result-section{background:var(--card);border:1px solid #90c8a055;border-radius:14px;padding:18px;margin-bottom:12px}
.section-title{font-size:.78rem;font-weight:700;color:var(--pr2);letter-spacing:.08em;margin-bottom:12px}
.traits{display:flex;flex-wrap:wrap;gap:8px}
.trait{background:linear-gradient(135deg,#4caf7430,#80d4a020);border:1px solid #4caf7455;border-radius:20px;padding:5px 12px;font-size:.8rem;font-weight:600}
.weaknesses{display:flex;flex-direction:column;gap:6px}
.weakness{display:flex;align-items:flex-start;gap:8px;font-size:.85rem;color:var(--sub)}
.weakness::before{content:'△';font-size:.7rem;color:var(--pr);margin-top:2px;flex-shrink:0}
.desc{font-size:.85rem;line-height:1.8}
.compat{display:flex;align-items:center;gap:12px;background:var(--card2);border-radius:10px;padding:12px}
.compat-icon{font-size:2rem;flex-shrink:0}
.compat-name{font-size:1rem;font-weight:700;color:var(--pr2)}
.compat-why{font-size:.78rem;color:var(--sub);margin-top:2px}
.tendency-bars{display:flex;flex-direction:column;gap:10px}
.tend-row{display:flex;align-items:center;gap:10px;font-size:.8rem}
.tend-label{width:70px;flex-shrink:0;color:var(--sub)}
.tend-bar-wrap{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.tend-bar{height:100%;background:linear-gradient(90deg,#4caf74,#80d4a0);border-radius:4px;transition:width 1s ease .3s;width:0}
.tend-val{width:26px;text-align:right;font-size:.75rem;color:var(--pr2)}
.share-section{background:var(--card);border:1px solid #90c8a055;border-radius:14px;padding:18px;margin-bottom:12px}
.share-title{font-size:.78rem;font-weight:700;color:var(--sub);text-align:center;margin-bottom:12px}
.share-btns{display:flex;flex-direction:column;gap:10px}
.btn-x{background:#000;color:#fff;border:1.5px solid #333;border-radius:12px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-x:hover{background:#111;transform:translateY(-1px)}
.btn-line{background:#06c755;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-line:hover{background:#05b34c;transform:translateY(-1px)}
.btn-retry{background:transparent;color:var(--sub);border:1.5px solid #90c8a088;border-radius:12px;padding:11px;font-size:.85rem;cursor:pointer;width:100%;transition:.2s}
.btn-retry:hover{border-color:var(--pr);color:var(--pr)}
.line-cta{background:linear-gradient(135deg,#e8f8f0,#d0f0e0);border:1px solid #90d4a8;border-radius:14px;padding:22px 18px;text-align:center;margin-bottom:12px}
.line-cta-icon{font-size:2rem;margin-bottom:6px}
.line-cta-title{font-size:1.05rem;font-weight:800;color:#059948;margin-bottom:6px}
.line-cta-text{font-size:.8rem;color:#3a7a50;line-height:1.6;margin-bottom:14px}
.btn-line-cta{background:#06c755;color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;text-decoration:none}
.btn-line-cta:hover{background:#05b34c;transform:translateY(-1px)}
.result-footer{text-align:center;font-size:.7rem;color:var(--sub);padding-top:8px}
/* LIBRARY */
.lib-hero{text-align:center;padding:20px 0 10px}
.lib-hero h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
/* MODAL */
#type-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;overflow-y:auto;padding:20px}
.type-modal-inner{max-width:440px;margin:20px auto;background:var(--card);border:1px solid #90c8a088;border-radius:20px;padding:28px 20px 36px;animation:fadeUp .32s ease both}
.bm-close{float:right;background:transparent;border:none;font-size:1.4rem;cursor:pointer;color:var(--sub);line-height:1;padding:0}
.bm-emoji{font-size:60px;display:block;text-align:center;margin-bottom:10px}
.bm-name{font-size:1.4rem;font-weight:900;text-align:center;letter-spacing:.04em;margin-bottom:4px;background:linear-gradient(135deg,#80d4a0,#c8f5d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bm-catch{font-size:.82rem;color:var(--sub);text-align:center;margin-bottom:14px;line-height:1.5}
.bm-keywords{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
.bm-kw{background:linear-gradient(135deg,#4caf7435,#80d4a025);border:1px solid #4caf7455;border-radius:20px;padding:5px 12px;font-size:.8rem;font-weight:600}
.bm-desc{font-size:.85rem;color:var(--sub);line-height:1.6;margin-bottom:18px;text-align:center}
.bm-startbtn{width:100%;padding:13px;background:linear-gradient(135deg,#1a5c30,#4caf74);color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s}
.bm-startbtn:hover{transform:translateY(-2px)}
footer{text-align:center;padding:20px 16px;color:var(--sub);font-size:.7rem;border-top:1px solid #90c8a044;margin-top:20px}
</style>
</head>

let answerHistory=[], scores={}, currentQ=0, _shareText='';

function setActiveNav(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  setActiveNav(id);
  window.scrollTo({top:0,behavior:'smooth'});
}
function showTypeInfo(key){
  const b=typeInfo[key];if(!b)return;
  document.getElementById('type-modal-content').innerHTML=
    '<button class="bm-close" onclick="closeTypeModal()">✕</button>'+
    '<span class="bm-emoji">'+b.emoji+'</span>'+
    '<div class="bm-name">'+b.name+'</div>'+
    '<div class="bm-catch">'+b.catch+'</div>'+
    '<div class="bm-keywords">'+b.keywords.map(k=>'<span class="bm-kw">'+k+'</span>').join('')+'</div>'+
    '<div class="bm-desc">'+b.summary+'</div>'+
    '<button class="bm-startbtn" onclick="closeTypeModal();startQuiz()">🦁 無料で診断する（10問）</button>';
  document.getElementById('type-modal').style.display='block';
  document.body.style.overflow='hidden';
}
function closeTypeModal(){
  document.getElementById('type-modal').style.display='none';
  document.body.style.overflow='';
}
function resetScores(){
  scores={};answerHistory=[];
  Object.keys(results).forEach(k=>scores[k]=0);
}
function startQuiz(){
  resetScores();currentQ=0;
  showScreen('quiz');renderQuestion();
}
function goBack(){
  if(currentQ<=0)return;
  const last=answerHistory.pop();
  Object.entries(last).forEach(([k,v])=>{scores[k]=(scores[k]||0)-v;});
  currentQ--;renderQuestion();
  const c=document.querySelector('.q-card');c.style.animation='none';c.offsetHeight;c.style.animation='fadeUp .35s ease both';
}
function renderQuestion(){
  const q=questions[currentQ],n=currentQ+1,pct=Math.round(n/questions.length*100);
  document.getElementById('q-counter').textContent='Q '+n+' / '+questions.length;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-num-label').textContent='QUESTION '+String(n).padStart(2,'0');
  document.getElementById('q-text').textContent=q.text;
  const back=document.getElementById('btn-back');
  if(back)back.style.display=currentQ>0?'flex':'none';
  const wrap=document.getElementById('options-wrap');wrap.innerHTML='';
  q.opts.forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt';
    const m=opt.text.match(/^(\S+)\s(.+)$/);
    if(m){
      btn.innerHTML='<span class="opt-icon">'+m[1]+'</span>'+m[2];
    } else {
      btn.textContent=opt.text;
    }
    btn.onclick=()=>selectAnswer(opt.scores,btn);
    wrap.appendChild(btn);
  });
}
function selectAnswer(scoreMap,btn){
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  btn.classList.add('selected');
  answerHistory.push(Object.assign({},scoreMap));
  Object.entries(scoreMap).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  setTimeout(()=>{
    currentQ++;
    if(currentQ<questions.length){
      renderQuestion();
      const c=document.querySelector('.q-card');c.style.animation='none';c.offsetHeight;c.style.animation='fadeUp .35s ease both';
    } else showResult();
  },420);
}
function showResult(){
  const key=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

  ).join('');
  document.getElementById('result').innerHTML=`
    <div class="result-hero">
      <div class="result-icon">${r.emoji}</div>
      <div class="result-label">あなたの動物タイプ</div>
      <div class="result-name">${r.name}</div>
      <div class="result-catch">${r.catch}</div>
    </div>
    <div class="result-section"><div class="section-title">✨ 長所・強み</div><div class="traits">${r.traits.map(t=>'<span class="trait">'+t+'</span>').join('')}</div></div>
    <div class="result-section"><div class="section-title">💬 詳細解説</div><div class="desc">${r.desc}</div></div>
    <div class="result-section"><div class="section-title">△ 気をつけたいこと</div><div class="weaknesses">${r.weaknesses.map(w=>'<div class="weakness">'+w+'</div>').join('')}</div></div>
    <div class="result-section"><div class="section-title">💕 相性の良いタイプ</div><div class="compat"><div class="compat-icon">${r.compat.emoji}</div><div><div class="compat-name">${r.compat.name}</div><div class="compat-why">${r.compat.why}</div></div></div></div>
    <div class="result-section"><div class="section-title">📊 あなたの傾向</div><div class="tendency-bars">${tendHTML}</div></div>
    <div class="share-section">
      <div class="share-title">📣 結果をシェアしよう</div>
      <div class="share-btns">
        <button class="btn-x" onclick="shareX()"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.742-8.852L1.512 2.25h6.961l4.263 5.623 5.508-5.623zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> Xでシェア</button>
        <button class="btn-line" onclick="shareLINE()"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg> LINEでシェア</button>
        <button class="btn-retry" onclick="startQuiz()">🔄 もう一度診断する</button>
      </div>
    </div>
    <div class="line-cta">
      <div class="line-cta-icon">🔮</div>
      <div class="line-cta-title">本格占いは星夜堂へ</div>
      <div class="line-cta-text">動物タイプだけでなく、あなたの生年月日から<br>今日の運勢・今月の流れを毎日お届けします</div>
      <a class="btn-line-cta" href="${LINE_OA}" target="_blank"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg> 星夜堂でもっと詳しく占う</a>
    </div>
    <div class="result-footer">© 星夜堂 — 動物パーソナリティ診断 🦁</div>
  `;
  showScreen('result');
  setTimeout(()=>{document.querySelectorAll('.tend-bar').forEach(b=>b.style.width=b.dataset.w);},400);
}
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(_shareText+SHARE_URL),'_blank');}
function shareLINE(){window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(SHARE_URL)+'&text='+encodeURIComponent(_shareText),'_blank');}
</script>
