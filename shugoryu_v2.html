<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護龍診断 — あなたを守護する龍は？</title>

<meta property="og:title" content="守護龍診断 — あなたを守護する龍は？">

<style>
:root{
  --pr:#c47d45;--pr2:#e8a96a;--bg:#130d08;--card:#221508;--card2:#2c1c0c;--border:#4a2e15;
  --text:#fdf3e7;--sub:#b8956a;--fg:#fdf3e7;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(107,58,31,.2) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(255,215,0,.08) 0%,transparent 60%);
}
#app{max-width:480px;margin:0 auto;padding:16px 16px 40px;min-height:100vh;display:flex;flex-direction:column}

/* ===== SCREENS ===== */
.screen{display:none;animation:fadeUp .4s ease both}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ===== TOP ===== */
#top{align-items:center;justify-content:center;text-align:center;gap:20px;padding:24px 0}
.top-icon{font-size:80px;line-height:1;filter:drop-shadow(0 0 20px rgba(196,125,69,.6));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.top-title{font-size:28px;font-weight:800;letter-spacing:.04em;
  background:linear-gradient(135deg,var(--gold2),var(--pr2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-sub{font-size:14px;color:var(--sub);line-height:1.7;max-width:320px}
.top-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--sub)}
.btn-start{width:100%;max-width:320px;padding:18px;background:linear-gradient(135deg,#6b3a1f,#c47d45);
  color:#fff;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,92,191,.4);transition:.2s;letter-spacing:.05em}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(107,58,31,.5)}
.types-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.type-chip{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;font-size:13px}
.type-chip .emoji{font-size:22px;display:block;margin-bottom:4px}

/* ===== QUIZ ===== */
#quiz{gap:0}
.progress-wrap{padding:8px 0 20px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:8px}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pr),var(--gold));border-radius:3px;transition:width .4s ease}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin-bottom:20px;
  box-shadow:var(--shadow)}
.q-num{font-size:12px;color:var(--pr2);font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.q-text{font-size:17px;font-weight:700;line-height:1.6;color:var(--text)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;
  font-size:15px;line-height:1.5;cursor:pointer;transition:.2s;text-align:left;color:var(--text)}
.opt:hover{border-color:var(--pr2);background:rgba(124,92,191,.2);transform:translateX(4px)}
.opt.selected{border-color:var(--gold);background:rgba(255,215,0,.1);color:var(--gold)}
.opt .opt-icon{margin-right:8px;font-size:16px}

/* ===== RESULT ===== */
#result{gap:0;padding-top:0}
.result-hero{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border);
  border-radius:var(--radius);padding:32px 20px 24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);
  animation:heroIn .6s ease both}
@keyframes heroIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.result-icon{font-size:72px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 0 24px rgba(255,215,0,.6))}
.result-label{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.15em;margin-bottom:8px}
.result-name{font-size:32px;font-weight:900;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--gold2),var(--pr2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:10px}
.result-catch{font-size:15px;color:var(--sub);line-height:1.6}

.result-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--pr2);letter-spacing:.08em;margin-bottom:14px;
  display:flex;align-items:center;gap:6px}
.traits{display:flex;flex-wrap:wrap;gap:8px}
.trait{background:linear-gradient(135deg,rgba(124,92,191,.25),rgba(255,215,0,.15));
  border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.weaknesses{display:flex;flex-direction:column;gap:6px}
.weakness{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub)}
.weakness::before{content:'△';font-size:11px;color:var(--accent2)}
.desc{font-size:14px;line-height:1.8;color:var(--text)}
.compat{display:flex;align-items:center;gap:12px;background:var(--card2);border-radius:10px;padding:14px}
.compat-icon{font-size:32px}
.compat-info .compat-name{font-size:16px;font-weight:700;color:var(--gold)}
.compat-info .compat-why{font-size:12px;color:var(--sub);margin-top:2px}

.tendency-bars{display:flex;flex-direction:column;gap:10px}
.tend-row{display:flex;align-items:center;gap:10px;font-size:13px}
.tend-label{width:80px;flex-shrink:0;color:var(--sub)}
.tend-bar-wrap{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.tend-bar{height:100%;background:linear-gradient(90deg,var(--pr),var(--gold));border-radius:4px;transition:width 1s ease .3s}
.tend-val{width:28px;text-align:right;font-size:12px;color:var(--gold)}

/* ===== SHARE ===== */
.share-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.share-title{font-size:13px;font-weight:700;color:var(--sub);text-align:center;margin-bottom:14px}
.share-btns{display:flex;flex-direction:column;gap:10px}
.btn-x{background:#000;color:#fff;border:1.5px solid #333;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-x:hover{background:#1a1a1a;transform:translateY(-1px)}
.btn-line{background:#06c755;color:#fff;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-line:hover{background:#05b34c;transform:translateY(-1px)}
.btn-retry{background:transparent;color:var(--sub);border:1.5px solid var(--border);border-radius:12px;padding:12px;
  font-size:14px;cursor:pointer;width:100%;transition:.2s}
.btn-retry:hover{border-color:var(--pr2);color:var(--pr2)}

/* ===== LINE CTA ===== */
.line-cta{background:linear-gradient(135deg,#0a2a1a,#0d3b24);border:1px solid #1a5c35;
  border-radius:var(--radius);padding:24px 20px;text-align:center;margin-bottom:12px}
.line-cta-icon{font-size:36px;margin-bottom:8px}
.line-cta-title{font-size:17px;font-weight:800;color:#06c755;margin-bottom:8px}
.line-cta-text{font-size:13px;color:#7fbf93;line-height:1.6;margin-bottom:16px}
.btn-line-cta{background:#06c755;color:#fff;border:none;border-radius:12px;padding:16px 24px;
  font-size:15px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;
  text-decoration:none}
.btn-line-cta:hover{background:#05b34c;transform:translateY(-2px);box-shadow:0 6px 20px rgba(6,199,85,.35)}

/* ===== RESULT FOOTER ===== */
.result-footer{text-align:center;font-size:11px;color:var(--sub);padding-top:8px}
.btn-back{display:none;align-items:center;justify-content:center;gap:6px;margin-top:16px;
  background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px 16px;
  font-size:13px;color:var(--sub);cursor:pointer;width:100%;transition:.2s}
.btn-back:hover{border-color:var(--pr2);color:var(--pr2)}
#type-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;
  overflow-y:auto;padding:20px 16px}
.type-modal-inner{max-width:440px;margin:20px auto;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;position:relative}
.bm-close{float:right;background:transparent;border:none;font-size:24px;cursor:pointer;color:var(--sub);line-height:1;padding:0}
.bm-emoji{font-size:64px;display:block;text-align:center;margin-bottom:12px;filter:drop-shadow(0 0 16px rgba(107,58,31,.5))}
.bm-name{font-size:24px;font-weight:900;text-align:center;letter-spacing:.06em;margin-bottom:6px;
  background:linear-gradient(135deg,#7c5cbf,#a07de0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bm-catch{font-size:13px;color:var(--sub);text-align:center;margin-bottom:16px;line-height:1.5}
.bm-keywords{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.bm-kw{background:linear-gradient(135deg,rgba(124,92,191,.35),rgba(124,92,191,.25));
  border:1px solid rgba(107,58,31,.5);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700}
.bm-desc{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:20px;text-align:center}
.bm-startbtn{width:100%;padding:14px;background:linear-gradient(135deg,#7c5cbf,#a07de0);
  border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.bm-startbtn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div id="app">

<!-- TOP SCREEN -->
<div id="top" class="screen active">
  <div class="top-icon">🐉</div>
  <div>
    <div class="top-title">守護龍診断</div>
    <div style="font-size:13px;color:var(--gold);margin-top:4px;margin-bottom:12px;font-weight:600;letter-spacing:.05em">あなたを守護する龍はどれ？</div>
    <div class="top-sub">10の質問であなたの内なるエネルギーと使命を守護する「龍」がわかります。6種類の守護龍から、あなたにぴったりの龍を診断します。</div>
  </div>
  <div class="top-meta">
    <span class="badge">⏱ 約2分</span>
    <span class="badge">❓ 全10問</span>
    <span class="badge">🐉 全6タイプ</span>
  </div>
  <div class="types-preview">
    <div class="type-chip" onclick="showTypeInfo('kin')"><span class="emoji">🌟</span>金龍</div>
    <div class="type-chip" onclick="showTypeInfo('en')"><span class="emoji">🔥</span>炎龍</div>
    <div class="type-chip" onclick="showTypeInfo('sakura')"><span class="emoji">🌸</span>桜龍</div>
    <div class="type-chip" onclick="showTypeInfo('arashi')"><span class="emoji">⚡</span>嵐龍</div>
    <div class="type-chip" onclick="showTypeInfo('tsuki')"><span class="emoji">🌙</span>月龍</div>
    <div class="type-chip" onclick="showTypeInfo('taichi')"><span class="emoji">🏔️</span>大地龍</div>
  </div>
  <button class="btn-start" onclick="startQuiz()">診断スタート 🐉</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="q-counter">Q 1 / 10</span>
      <span id="q-pct">10%</span>

  <div class="q-card">

  </div>
  <div class="options" id="options-wrap"></div>
  <button class="btn-back" id="btn-back" onclick="goBack()">← 前の質問に戻る</button>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen"></div>

<div id="type-modal" onclick="if(event.target===this)closeTypeModal()">
  <div class="type-modal-inner" id="type-modal-content"></div>
</div>

</div>

<script>
const SHARE_URL = 'https://hoshiyorudou.jp/shugoryu';
const LINE_OA   = 'https://lin.ee/hoshiyorudou';

// ===== QUESTIONS =====
const questions = [
  {
    text: '休日の過ごし方は？',
    opts: [
      { text: '📋 目標を決めて充実させる', scores: { kin:3, taichi:1 } },

      { text: '👥 周囲の意見を聞いてから決める', scores: { sakura:2, tsuki:2 } },
    ]
  },
  {
    text: '友人が落ち込んでいたら？',
    opts: [
      { text: '🔧 解決策を一緒に考える', scores: { kin:2, taichi:3 } },
      { text: '🎉 気分転換に連れ出す', scores: { en:3, arashi:1 } },
      { text: '👂 とにかく話をじっくり聞く', scores: { sakura:3, tsuki:2 } },
    ]
  },
  {
    text: '大切な決断をするとき？',
    opts: [
      { text: '📈 データと実績で冷静に判断', scores: { kin:3, taichi:1 } },
      { text: '✨ 直感とタイミングを信じる', scores: { tsuki:3, arashi:2 } },
      { text: '❤️ 自分の気持ちと周囲への影響で', scores: { sakura:2, en:1 } },

  },
  {
    text: 'ストレスを感じたとき、あなたは？',
    opts: [
      { text: '🧘 一人で整理する時間をとる', scores: { tsuki:3, kin:1 } },
      { text: '🏃 体を動かして発散する', scores: { en:3, arashi:1 } },
      { text: '💬 誰かに話して気持ちを出す', scores: { sakura:3, taichi:1 } },
    ]
  },
  {
    text: 'あなたが一番強みだと思うのは？',
    opts: [

      { text: '🔥 情熱と行動力', scores: { en:3, arashi:2 } },

      { text: '🌸 大切な人たちとの幸せな未来で', scores: { sakura:3, tsuki:2 } },
    ]
  },
  {
    text: '友人にどう見られていると思う？',
    opts: [
      { text: '💪 頼れる・責任感がある', scores: { kin:3, taichi:3 } },
      { text: '😄 面白い・エネルギッシュ', scores: { en:3, arashi:2 } },
      { text: '🌙 ミステリアス・独特の感性がある', scores: { tsuki:3, arashi:1 } },
    ]
  },
  {
    text: '理想の生き方は？',
    opts: [
      { text: '🏆 確かな成果を積み上げていく人生', scores: { kin:3, taichi:2 } },
      { text: '🌊 情熱のままに自分らしく突き進む', scores: { en:3, arashi:2 } },
      { text: '🌿 深い縁で結ばれた人と共に歩む', scores: { sakura:2, tsuki:3 } },
    ]
  },
  {
    text: '夜空を見上げたとき、引かれるのは？',
    opts: [
      { text: '⭐ 整然と輝く星座の秩序と美しさ', scores: { kin:2, tsuki:2 } },
      { text: '☄️ 一瞬に輝く流れ星の力強さ', scores: { en:3, arashi:2 } },
      { text: '🌕 静かに満ち欠けを繰り返す月', scores: { tsuki:3, sakura:1 } },
    ]
  },
];

// ===== RESULTS =====
const results = {
  kin: {
    emoji: '🌟', name: '金龍', catch: '繁栄と成功をもたらす黄金の守護龍',
    traits: ['卓越したリーダーシップ','強い責任感と誠実さ','目標達成への意志'],

    desc: '桜龍があなたを守護しています。散る桜の花びらのように、人と人の縁を優しく結ぶ存在です。温かい包容力と深い愛情で周囲を包み込み、チームの調和を保つ天性の調整者でもあります。',

  },
  arashi: {
    emoji: '⚡', name: '嵐龍', catch: '変革と突破力で常識を打ち破る龍',
    traits: ['圧倒的な創造力と独創性','変化への対応力','枠を超えるエネルギー'],

function showTypeInfo(key){
  const b=typeInfo[key];if(!b)return;
  const modal=document.getElementById('type-modal');
  document.getElementById('type-modal-content').innerHTML=
    '<button class="bm-close" onclick="closeTypeModal()">✕</button>'+
    '<span class="bm-emoji">'+b.emoji+'</span>'+
    '<div class="bm-name">'+b.name+'</div>'+
    '<div class="bm-catch">'+b.catch+'</div>'+
    '<div class="bm-keywords">'+b.keywords.map(k=>'<span class="bm-kw">'+k+'</span>').join('')+'</div>'+
    '<div class="bm-desc">'+b.summary+'</div>'+
    '<button class="bm-startbtn" onclick="closeTypeModal();startQuiz()">🐉 診断してみる</button>';
  modal.style.display='block';document.body.style.overflow='hidden';
}
function closeTypeModal(){
  document.getElementById('type-modal').style.display='none';
  document.body.style.overflow='';
}

let answerHistory=[];
let scores = {};
let currentQ = 0;
let _shareText = '';

function resetScores(){
  scores = {};answerHistory=[];
  Object.keys(results).forEach(k => scores[k] = 0);
}

function goBack(){if(currentQ<=0)return;const last=answerHistory.pop();Object.entries(last).forEach(([k,v])=>{scores[k]=(scores[k]||0)-v;});currentQ--;renderQuestion();const c=document.querySelector('.q-card');c.style.animation='none';c.offsetHeight;c.style.animation='fadeUp .35s ease both';}
function startQuiz(){
  resetScores();
  currentQ = 0;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQuestion(){
  const q = questions[currentQ];
  const n = currentQ + 1;
  const pct = Math.round(n / questions.length * 100);
  document.getElementById('q-counter').textContent = `Q ${n} / ${questions.length}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-num-label').textContent = 'QUESTION ' + String(n).padStart(2,'0');
  document.getElementById('q-text').textContent = q.text;

  const back=document.getElementById('btn-back');if(back)back.style.display=currentQ>0?'flex':'none';
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    var _m = opt.text.match(/^(\S+)\s(.+)$/);
    btn.innerHTML = '<span class="opt-icon">' + (_m ? _m[1] : '') + '</span>' + (_m ? _m[2] : opt.text);
    btn.onclick = () => selectAnswer(opt.scores, btn);
    wrap.appendChild(btn);
  });
}

function selectAnswer(scoreMap, btn){
  // Disable all buttons
  document.querySelectorAll('.opt').forEach(b => b.style.pointerEvents='none');
  btn.classList.add('selected');
  answerHistory.push(Object.assign({},scoreMap));

  // Add scores
  Object.entries(scoreMap).forEach(([k,v]) => { scores[k] = (scores[k]||0) + v; });

  setTimeout(() => {
    currentQ++;
    if(currentQ < questions.length){
      renderQuestion();
      // Animate question card
      const card = document.querySelector('.q-card');
      card.style.animation='none';
      card.offsetHeight;
      card.style.animation='fadeUp .35s ease both';
    } else {
      showResult();
    }
  }, 420);
}

function getTopResult(){
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function showResult(){
  const key = getTopResult();
  const r = results[key];
  const el = document.getElementById('result');

  _shareText = '私の守護龍は「' + r.name + '」でした！\nあなたの守護龍は？\n';

      <div class="tend-val">${val}</div>
    </div>`

    </div>

        </button>

          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.627.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.494.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          LINEでシェア
        </button>
        <button class="btn-retry" onclick="startQuiz()">🔄 もう一度診断する</button>
      </div>
    </div>

    <div class="line-cta">
      <div class="line-cta-icon">🔮</div>
      <div class="line-cta-title">本格占いは星夜堂へ</div>
      <div class="line-cta-text">守護龍だけでなく、あなたの生年月日から<br>今日の運勢・今月の流れを毎日お届けします</div>
      <a class="btn-line-cta" href="${LINE_OA}" target="_blank">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
        星夜堂でもっと詳しく占う
      </a>
    </div>

    <div class="result-footer">© 星夜堂 — 守護龍診断</div>
  `;

  showScreen('result');

  // Animate tendency bars after render
  setTimeout(() => {
    document.querySelectorAll('.tend-bar').forEach(bar => {
      bar.style.width = bar.dataset.w;
    });
  }, 400);
}

function shareX(){
  var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(_shareText + SHARE_URL);
  window.open(url,'_blank');
}
function shareLINE(){
  var url = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(SHARE_URL) + '&text=' + encodeURIComponent(_shareText);
  window.open(url,'_blank');
}
